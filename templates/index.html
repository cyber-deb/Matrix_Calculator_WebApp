<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Calculator</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

    <h1>Matrix Calculator</h1>
    <p class="subtitle">Perform Matrix Operations Instantly</p>

    <div class="panel">

        <div class="size-selector">

            <div>
                <label>Rows</label>
                <input type="number" id="rows" min="1" max="6" value="2">
            </div>

            <div>
                <label>Columns</label>
                <input type="number" id="cols" min="1" max="6" value="2">
            </div>

            <button onclick="generateMatrices()">
                Generate Matrices
            </button>

        </div>

        <!-- NEW INFO BOX -->
        <div id="operationNote" class="operation-note" style="display:none;">
            ℹ️ Determinant and Inverse are calculated using <strong>Matrix A</strong> only.
            Matrix B is ignored for these operations.
        </div>

        <div class="matrices">

            <div class="matrix-card">
                <h2>Matrix A</h2>
                <div id="matrixA"></div>
            </div>

            <div id="matrixBCard" class="matrix-card">
                <h2>Matrix B</h2>
                <div id="matrixB"></div>
            </div>

        </div>

        <div class="operations">

            <button onclick="calculate('add')">Add</button>
            <button onclick="calculate('subtract')">Subtract</button>
            <button onclick="calculate('multiply')">Multiply</button>
            <button onclick="calculate('determinant')">Determinant</button>
            <button onclick="calculate('inverse')">Inverse</button>

        </div>

        <div id="result" class="result"></div>

    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
